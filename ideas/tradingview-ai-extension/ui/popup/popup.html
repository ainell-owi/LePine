<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e222d;
      color: #d1d4dc;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #ffffff;
    }
    .section {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #9ca3af;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      background: #2a2e39;
      border: 1px solid #363a45;
      border-radius: 4px;
      color: #d1d4dc;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      background: #5568d3;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    .status.success {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
  </style>
</head>
<body>
  <h2>🤖 TradingView AI Extension</h2>
  
  <div class="section">
    <label for="api-key">Anthropic API Key:</label>
    <input type="password" id="api-key" placeholder="sk-ant-...">
    <button id="save-key">Save API Key</button>
    <div id="key-status"></div>
  </div>

  <div class="section">
    <p style="font-size: 12px; color: #9ca3af;">
      Get your API key from <a href="https://console.anthropic.com/" target="_blank" style="color: #667eea;">Anthropic Console</a>
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
